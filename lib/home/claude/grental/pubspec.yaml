name: grental
description: Rental-R — Car Rental App by DriveFlow Co., Ltd.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.0.0
  google_fonts: ^6.3.3
  intl: ^0.19.0

  # Firebase — uncomment เมื่อมี google-services.json
  # firebase_core: ^3.0.0
  # firebase_auth: ^5.0.0
  # cloud_firestore: ^5.0.0
  # firebase_storage: ^12.0.0
  # firebase_ai: ^2.0.0
  # flutter_ai_toolkit: ^0.6.0
  # flutter_riverpod: ^2.5.1
  # google_sign_in: ^6.3.0

  # Utils
  shared_preferences: ^2.3.2
  connectivity_plus: ^6.1.5
  permission_handler: ^11.4.0
  image_picker: ^1.1.2
  url_launcher: ^6.3.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fluttertoast: ^8.2.14
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

  fonts:
    - family: Urbanist
      fonts:
        - asset: assets/fonts/Urbanist-Regular.ttf
        - asset: assets/fonts/Urbanist-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Urbanist-Bold.ttf
          weight: 700
        - asset: assets/fonts/Urbanist-ExtraBold.ttf
          weight: 800
    - family: NotoSansThai
      fonts:
        - asset: assets/fonts/NotoSansThai-Regular.ttf
        - asset: assets/fonts/NotoSansThai-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoSansThai-Bold.ttf
          weight: 700
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
